# [ref: HPC POPUPS] prefix+j >> slurm job monitor  (q to close)
bind-key j display-popup -E -w 90% -h 45% \
  "bash -c 'while true; do clear; squeue --me --format=\"%.18i %.9P %.90j %.8u %.8T %.10M %.9l %.6D %R\"; echo; echo \"  q to quit  |  refreshes every 5s\"; read -t 5 -n 1 key; [[ \"\$key\" == q ]] && break; done'"
