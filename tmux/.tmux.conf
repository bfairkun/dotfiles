setw -g alternate-screen on

# [ref: CLIPBOARD] prefix+Ctrl+c >> copy buffer -> local clipboard (pbcopy_to_local)
# copy to local clipboard with custom pbcopy script in PATH
bind-key C-c run "tmux save-buffer - | pbcopy_to_local;"
# [ref: CLIPBOARD] mouse highlight >> auto-copies selection to tmux buffer
# [ref: CLIPBOARD] prefix+] >> paste from tmux buffer  (tmux default)

# [ref: SPLITS] prefix+" >> split pane horizontally  (same dir)
# open split window panes in the same dir as current
bind '"' split-window -c "#{pane_current_path}"
# [ref: SPLITS] prefix+% >> split pane vertically    (same dir)
bind % split-window -h -c "#{pane_current_path}"

# [ref: PANES] Ctrl+h/j/k/l >> move left / down / up / right  (vim-aware)
# [ref: PANES] prefix+arrows >> move between panes  (tmux default)
# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

# [ref: COPY MODE] PgUp >> enter copy mode + scroll up
# [ref: COPY MODE] prefix+[ >> enter copy mode  (tmux default)
# [ref: COPY MODE] v select, y yank >> in copy mode  (tmux default vi bindings)
# [ref: COPY MODE] Ctrl+c or q >> exit copy mode
# Page up/down with fn+ArrowUp / fn+ArrowDown (works in normal and copy mode)
bind-key -n PPage copy-mode -u
bind-key -T copy-mode-vi PPage send-keys -X page-up
bind-key -T copy-mode-vi NPage send-keys -X page-down

# [ref: SPLITS] prefix+s >> toggle synchronize-panes
# toggle synchronize panes
bind s setw synchronize-panes

#tmux colors
set -g default-terminal "screen-256color"
set -g mouse on

# Browser-tab style windows (tabs on top)
# https://www.seanh.cc/2020/12/30/how-to-make-tmux's-windows-behave-like-browser-tabs/
set -g base-index 1
set -g pane-base-index 1
set -g status-position top
set -g status-style "bg=default"
set -g window-status-current-style "bg=default,reverse"
set -g window-status-separator ''
set -g window-status-format "#{?window_start_flag,, }#I:#W#{?window_flags,#F, } "
set -g window-status-current-format "#{?window_start_flag,, }#I:#W#{?window_flags,#F, } "
set -g status-left ''
set -g status-right "#(cd #{pane_current_path} && git branch --show-current 2>/dev/null)#(cd #{pane_current_path} && git status --porcelain 2>/dev/null | grep -q . && echo ' *')"

# [ref: WINDOWS] Ctrl+t >> new window
bind -n C-t new-window
# [ref: WINDOWS] Alt+Left / Alt+Right >> prev / next window  (if broken try Esc+arrow)
bind -n M-Left previous-window
bind -n M-Right next-window
# [ref: WINDOWS] Alt+1 ... Alt+9 >> jump to window N
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t:$
# [ref: WINDOWS] Ctrl+Alt+w >> kill window
bind -n C-M-w kill-window
# [ref: WINDOWS] Ctrl+Alt+q >> kill session  (prompts to confirm)
bind -n C-M-q confirm -p "Kill this tmux session?" kill-session
# [ref: PANES] F11 / prefix+z >> zoom / unzoom current pane
bind -n F11 resize-pane -Z

# [ref: POPUPS] prefix+b >> this reference  (any key to close)
bind-key b display-popup -E -w 90% -h 90% "tmux_hotkey_ref"

# Version-specific configuration can be placed in
# ~/.tmux/${TMUX_VERSION}/*.conf. I haven't tested code on all different
# versions of tmux... so if something is buggy, make sure the buggy line works
# with the version of tmux you are using, and place it in a version specific
# config file as necessary
run-shell "for conf in ~/.tmux/$(tmux -V | cut -d' ' -f2)/*.conf; do tmux source-file \"$conf\"; done"

# Additionally, local tmux configuration can be placed in ~/.tmux_local.conf/
if-shell "[ -f ~/.tmux_local.conf ]" 'source ~/.tmux_local.conf'
