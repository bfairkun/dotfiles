name: py_general
# Installation note (UMich Great Lakes / memory-constrained login nodes):
#   conda env create is killed during solving (4 GB cgroup limit on login nodes).
#   Use micromamba instead — much lower memory for the same solve:
#     ~/bin/micromamba env create -f py_general.yaml --yes
#   Install micromamba if needed (single binary, no conda required):
#     curl -Ls https://micro.mamba.pm/api/micromamba/linux-64/latest | tar -xvj -C ~/bin/ --strip-components=1 bin/micromamba
#   The pip section triggers a second solve pass; strip it from a temp copy and pip install afterward if needed.
channels:
  - conda-forge
  - bioconda
  - r
dependencies:
  # Jupyter / notebook
  - jupyterlab
  - jupyter
  - ipykernel
  - ipython
  - ipywidgets
  - nbconvert
  - nbformat
  - nbclient
  - papermill

  # Core scientific
  - numpy
  - pandas
  - scipy
  - matplotlib
  - seaborn
  - plotnine
  - altair
  - bokeh
  - plotly

  # Data / IO
  - polars
  - pyarrow
  - openpyxl
  - xarray
  - dask

  # Stats / ML
  - scikit-learn
  - statsmodels
  - arviz
  - pymc>=5
  - pip
  - pytensor
  - tensorflow

  # Bioinformatics
  - biopython
  - bedtools
  - pybedtools
  - pysam
  - pygenometracks
  - bedparse
  - pyfaidx
  - gffutils
  - pybigwig
  - bioconda::igv-reports
  - bioconda::spliceai
  - bioconda::htseq
  - bioconda::blast=2.16.0
  - bioconda::snakemake=7.32.4
  - bioconda::hgvs
  - bioconda::logomaker
  - bioconda::gseapy  # GO/pathway enrichment (ORA + GSEA); gp.enrich() supports custom background

  # Utilities
  - jinja2
  - pytest
  - tqdm
  - future
  - pycryptodome
  - ca-certificates
  - certifi
  - openssl
  - pyopenssl>=24  # avoid drift vs cryptography (X509_V_FLAG_NOTIFY_POLICY removed in cryptography>=42)
  - natsort
  - anndata

  - pip:
    - my-utils==0.1.0
    - alphagenome==0.5.1
    - pikachu-chem==1.1.5

